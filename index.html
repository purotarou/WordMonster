    // --- 効果音(Web Audio API)の生成関数 ---
    const playSound = (type = 'click') => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        
        if (!window.audioCtx) {
          window.audioCtx = new AudioContext();
        }
        const ctx = window.audioCtx;
        
        if (ctx.state === 'suspended') {
          ctx.resume();
        }

        const now = ctx.currentTime;
        const gain = ctx.createGain();
        gain.connect(ctx.destination);

        if (type === 'swipe') {
          const osc = ctx.createOscillator();
          osc.connect(gain);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.setValueAtTime(1200, now + 0.1);
          gain.gain.setValueAtTime(0.15, now); 
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
          return;
        }

        const osc = ctx.createOscillator();
        osc.connect(gain);

        if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(2000, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'start') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.setValueAtTime(660, now + 0.1);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'left') {
          osc.type = 'sawtooth'; 
          osc.frequency.setValueAtTime(160, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.setValueAtTime(0.05, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'timeout') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.setValueAtTime(150, now + 0.1);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
        } else if (type === 'toggle') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(1200, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.02);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
          osc.start(now);
          osc.stop(now + 0.02);

          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          
          const time2 = now + 0.07; 
          osc2.type = 'square';
          osc2.frequency.setValueAtTime(2000, time2);
          osc2.frequency.exponentialRampToValueAtTime(100, time2 + 0.02);
          gain2.gain.setValueAtTime(0.04, time2);
          gain2.gain.exponentialRampToValueAtTime(0.001, time2 + 0.02);
          
          osc2.start(time2);
          osc2.stop(time2 + 0.02);
        } else if (type === 'setting') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(1500, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.02);
          gain.gain.setValueAtTime(0.03, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
          osc.start(now);
          osc.stop(now + 0.02);
        }
      } catch (e) {
        console.error("Web Audio API play failed", e);
      }
    };

        {id: 1908, en: "self-esteem", jp: "[名] 自尊心"},

        {id: 1915, en: "contempt", jp: "[名] 軽蔑"},
        {id: 1916, en: "insult", jp: "[名] ①侮辱 [他] ②～を侮辱する"},

        {id: 1919, en: "verge", jp: "[名] ①瀬戸際, 寸前 ② 道路べり, (場所の)縁"},
        {id: 1920, en: "incentive", jp: "[名] 励み"},
        {id: 1921, en: "outcome", jp: "[名] 結果"},
        {id: 1922, en: "thorough", jp: "[形] 完全な, 徹底的な"},
        {id: 1923, en: "adequate", jp: "[形] 十分な, 適切な"},
        {id: 1924, en: "overall", jp: "[形] ①全体的な, 全面的な [副] ②全体的に, 全面的に"},
        {id: 1925, en: "ultimate", jp: "[形] 究極の, 最終の"},
        {id: 1926, en: "genuine", jp: "[形] ①(感情が)心からの ②(絵画などが)本物の"},
        {id: 1927, en: "radical", jp: "[形] ①根本的な, 抜本的な ②過激な"},
        {id: 1928, en: "drastic", jp: "[形] 抜本的な, 思い切った"},
        {id: 1929, en: "trivial", jp: "[形] ささいな"},
        {id: 1930, en: "virtually", jp: "[副] 事実上"},
        {id: 1931, en: "abruptly", jp: "[副] 不意に, 突然"},
        {id: 1932, en: "deliberately", jp: "[副] ①故意に ②慎重に"},
        {id: 1933, en: "hence", jp: "[副] だから, それゆえに"},
        {id: 1934, en: "namely", jp: "[副] すなわち"},
        {id: 1935, en: "whereas", jp: "[接] ～だが一方"}
      ]
    };

    const partsInfo = [
      { id: 'part1', title: 'PART 1', desc: 'Active Vocabulary[最重要]' },
      { id: 'part2', title: 'PART 2', desc: 'Active Vocabulary[重要]' },
      { id: 'part3', title: 'PART 3', desc: 'Passive Vocabulary[最重要]' },
      { id: 'part4', title: 'PART 4', desc: 'Passive Vocabulary[重要]' },
    ];

    const TOTAL_WORDS_TARGET = 1935;
    const REQUIRED_STREAK = 3;

    const ExitingCard = ({ card, progress }) => {
      const [flyPos, setFlyPos] = useState({ x: card.x, y: card.y });

      useEffect(() => {
        const timer = setTimeout(() => {
          const flyOutX = card.direction === 'right' ? window.innerWidth + 200 : -window.innerWidth - 200;
          const flyOutY = card.y + (card.y > 0 ? 100 : -100);
          setFlyPos({ x: flyOutX, y: flyOutY });
        }, 10);
        return () => clearTimeout(timer);
      }, [card]);

      const isMastered = progress && progress.status === 2;
      const currentRequiredStreak = (progress && progress.required_streak) || REQUIRED_STREAK;
      const consecutiveCorrect = (progress && progress.consecutive_correct) || 0;

      return (
        <div
          className="absolute inset-0 bg-slate-900 rounded-[2rem] md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-6 md:p-12 border border-white/10 overflow-hidden z-20 pointer-events-none"
          style={{
            transition: 'transform 450ms cubic-bezier(0.1, 0.8, 0.2, 1), opacity 350ms ease-out 100ms',
            transform: `translate3d(${flyPos.x}px, ${flyPos.y}px, 0) rotate(${flyPos.x * 0.05}deg)`,
            opacity: 0 
          }}
        >
          <div className="absolute top-6 left-0 w-full pointer-events-none z-20">
            <div className={`absolute left-8 top-0 text-rose-400 font-black text-[12px] tracking-[0.2em] transition-opacity duration-200 ${card.direction === 'left' ? 'opacity-100' : 'opacity-0'}`}>REVIEW</div>
            
            <div className="flex justify-center w-full">
              <div className="flex gap-1 bg-slate-950/50 px-3 py-1.5 rounded-full border border-white/5 shadow-md">
                {isMastered ? (
                  <span className="text-[10px] text-emerald-400 font-bold flex items-center gap-1"><Icon name="CheckCircle" size={12}/> MASTERED</span>
                ) : (
                  [...Array(currentRequiredStreak)].map((_, i) => (
                    <div key={i} className={`w-2 h-2 rounded-full transition-colors duration-300 ${i < consecutiveCorrect ? 'bg-sky-400' : 'bg-slate-700'}`} />
                  ))
                )}
              </div>
            </div>

            <div className={`absolute right-8 top-0 text-emerald-400 font-black text-[12px] tracking-[0.2em] transition-opacity duration-200 ${card.direction === 'right' ? 'opacity-100' : 'opacity-0'}`}>MASTERED</div>
          </div>

          <div className="text-center w-full flex flex-col items-center justify-center h-full">
            <h2 className={`text-5xl md:text-7xl font-black text-white tracking-tighter ${card.showMeaning ? 'opacity-10 blur-md scale-90' : 'opacity-100'}`}>
              {card.word.en}
            </h2>
            {card.showMeaning && (
              <div className="absolute inset-0 flex items-center justify-center p-6">
                <p className="text-xl md:text-2xl font-bold text-sky-100 leading-relaxed bg-sky-600/20 p-6 md:p-10 rounded-[2rem] border border-sky-500/30 backdrop-blur-md">
                  {card.word.jp}
                </p>
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      
      const [currentScreen, setCurrentScreen] = useState('home'); 
      const [selectedPart, setSelectedPart] = useState('part1');
      const [shuffledWords, setShuffledWords] = useState([]);
      const [isStatsFlipped, setIsStatsFlipped] = useState(false); 
      const [showResetModal, setShowResetModal] = useState(false);
      
      const allWordsList = useMemo(() => Object.values(wordData).flat(), []);
      const maxWordId = allWordsList.length > 0 ? Math.max(...allWordsList.map(w => w.id)) : 1;
      const minWordId = allWordsList.length > 0 ? Math.min(...allWordsList.map(w => w.id)) : 1;

      const [settingWordCount, setSettingWordCount] = useState(1);
      const [settingTimeLimit, setSettingTimeLimit] = useState(0); 
      const [settingHideMastered, setSettingHideMastered] = useState(false);
      
      const [settingStartId, setSettingStartId] = useState(1);
      const [settingEndId, setSettingEndId] = useState(50);

      const [currentIndex, setCurrentIndex] = useState(0);
      const [knownCount, setKnownCount] = useState(0);
      const [unknownCount, setUnknownCount] = useState(0);
      const [showMeaning, setShowMeaning] = useState(false);
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const [isDragging, setIsDragging] = useState(false);
      const [startPos, setStartPos] = useState({ x: 0, y: 0 });
      const [exitingCard, setExitingCard] = useState(null);
      const [isTimeoutPenalty, setIsTimeoutPenalty] = useState(false); 
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      const SWIPE_THRESHOLD = 80;
      const words = shuffledWords;

      // --- Cloud Storage State ---
      const [userProgress, setUserProgress] = useState(() => {
        const saved = localStorage.getItem('wordMasterProgress');
        return saved ? JSON.parse(saved) : {};
      });

      const [userProfile, setUserProfile] = useState(() => {
        const saved = localStorage.getItem('wordMonsterProfile');
        return saved ? JSON.parse(saved) : { last_study_date: null, current_streak: 0, longest_streak: 0 };
      });

      // 1. Firebase Auth Initialization (Compat API)
      useEffect(() => {
        const initAuth = async () => {
          if (!auth) {
            setIsLoading(false); // Local environment fallback
            return;
          }
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (e) {
            console.error('Auth error:', e);
            setIsLoading(false);
          }
        };
        initAuth();
        if (auth) {
          const unsubscribe = auth.onAuthStateChanged(setUser);
          return () => unsubscribe();
        }
      }, []);

      // 2. Fetch Data from Firestore (Compat API)
      useEffect(() => {
        if (!user || !db) return;
        const docRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/main`);
        
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.progress) setUserProgress(data.progress);
            if (data.profile) setUserProfile(data.profile);
          }
          setIsLoading(false);
        }, (err) => {
          console.error("Firestore sync error:", err);
          setIsLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      const getLocalDateString = (date = new Date()) => {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      };

      const getYesterdayDateString = () => {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return getLocalDateString(d);
      };

      const isToday = (dateString) => {
        if (!dateString) return false;
        const d = new Date(dateString);
        const today = new Date();
        return d.getDate() === today.getDate() && 
               d.getMonth() === today.getMonth() && 
               d.getFullYear() === today.getFullYear();
      };

      const last7Days = useMemo(() => {
        if (currentScreen !== 'home') return []; 
        const days = [];
        const today = new Date();
        for (let i = 6; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          days.push({
            dateString: getLocalDateString(d),
            month: d.getMonth() + 1,
            dateNum: d.getDate(),
            dayOfWeek: ['日', '月', '火', '水', '木', '金', '土'][d.getDay()],
            count: 0
          });
        }
        
        Object.values(userProgress).forEach(p => {
          if (p.status === 2 && p.mastered_at) {
            const masteredDate = getLocalDateString(new Date(p.mastered_at));
            const targetDay = days.find(d => d.dateString === masteredDate);
            if (targetDay) targetDay.count++;
          }
        });
        
        days[6].dayOfWeek = '今日'; 
        return days;
      }, [userProgress, currentScreen]);

      const maxCount = currentScreen === 'home' ? Math.max(...last7Days.map(d => d.count)) : 0;
      const graphMax = Math.max(120, maxCount * 1.2); 
      const line50Pos = (50 / graphMax) * 100;
      const line100Pos = (100 / graphMax) * 100;

      const stats = useMemo(() => {
        let totalMastered = 0;
        let todayMastered = 0;

        Object.values(userProgress).forEach(p => {
          if (p.status === 2) {
            totalMastered++;
            if (isToday(p.mastered_at)) todayMastered++;
          }
        });

        return { totalMastered, todayMastered };
      }, [userProgress]);

      const displayStreak = useMemo(() => {
        const today = getLocalDateString();
        const yesterday = getYesterdayDateString();
        if (userProfile.last_study_date === today || userProfile.last_study_date === yesterday) {
          return userProfile.current_streak;
        }
        return 0; 
      }, [userProfile]);

      const handleStartIdChange = (e) => setSettingStartId(e.target.value === '' ? '' : Number(e.target.value));
      const handleStartIdBlur = () => {
        let val = Number(settingStartId);
        if (isNaN(val) || val < 1) val = 1;
        if (val > 1935) val = 1935;
        if (val > Number(settingEndId)) val = Number(settingEndId);
        setSettingStartId(val);
      };
      
      const handleEndIdChange = (e) => setSettingEndId(e.target.value === '' ? '' : Number(e.target.value));
      const handleEndIdBlur = () => {
        let val = Number(settingEndId);
        if (isNaN(val) || val > 1935) val = 1935;
        if (val < 1) val = 1;
        if (val < Number(settingStartId)) val = Number(settingStartId);
        setSettingEndId(val);
      };

      const handleDragStart = (e) => {
        if (currentIndex >= words.length || isTimeoutPenalty || exitingCard) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        setIsDragging(true);
        setShowMeaning(true); 
        setStartPos({ x: clientX, y: clientY });
      };

      const handleDragMove = (e) => {
        if (!isDragging || isTimeoutPenalty || exitingCard) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        setPosition({ 
          x: clientX - startPos.x, 
          y: (clientY - startPos.y) * 0.2 
        });
      };

      const handleDragEnd = () => {
        if (!isDragging || isTimeoutPenalty || exitingCard) return;
        setIsDragging(false);
        setShowMeaning(false); 

        if (Math.abs(position.x) > SWIPE_THRESHOLD) {
          triggerExit(position.x > 0 ? 'right' : 'left');
        } else {
          setPosition({ x: 0, y: 0 });
        }
      };

      const triggerExit = (direction, isTimeout = false) => {
        if (currentIndex >= words.length) return;

        if (!isTimeout) {
          if (direction === 'right') playSound('swipe');
          else playSound('left');
        }

        const word = words[currentIndex];
        const startX = position.x !== 0 ? position.x : (direction === 'right' ? 20 : -20);
        
        setExitingCard({
          word: word,
          x: isTimeout ? -50 : startX, 
          y: isTimeout ? 0 : position.y,
          direction: direction,
          showMeaning: false 
        });

        // --- Update Progress & Streak & Save to Cloud ---
        const currentProg = userProgress[word.id] || { status: 0, consecutive_correct: 0, mastered_at: null, last_reviewed_at: null, required_streak: REQUIRED_STREAK, timeout_count: 0 };
        const now = new Date().toISOString();
        let nextProg = { ...currentProg, last_reviewed_at: now };

        if (nextProg.required_streak === undefined) nextProg.required_streak = REQUIRED_STREAK;
        if (nextProg.timeout_count === undefined) nextProg.timeout_count = 0;

        if (direction === 'right') {
          nextProg.consecutive_correct += 1;
          nextProg.timeout_count = 0; 
          
          if (nextProg.consecutive_correct >= nextProg.required_streak && nextProg.status !== 2) {
            nextProg.status = 2;
            nextProg.mastered_at = now;
          } else if (nextProg.status === 0) {
            nextProg.status = 1;
          }
        } else {
          if (isTimeout) {
            nextProg.timeout_count += 1;
            if (nextProg.timeout_count >= 3) {
              nextProg.status = 0;
              nextProg.consecutive_correct = 0;
              nextProg.required_streak = REQUIRED_STREAK;
              nextProg.timeout_count = 0;
              nextProg.mastered_at = null;
            } else {
              if (nextProg.consecutive_correct === 0) nextProg.required_streak = 5;
              nextProg.status = 1; 
              nextProg.consecutive_correct = 0; 
            }
          } else {
            if (nextProg.consecutive_correct === 0) nextProg.required_streak = 5;
            nextProg.status = 1; 
            nextProg.consecutive_correct = 0; 
          }
        }

        const newProgressMap = { ...userProgress, [word.id]: nextProg };

        // Profile Update
        let newProfile = { ...userProfile };
        const today = getLocalDateString();
        if (userProfile.last_study_date !== today) {
          const yesterday = getYesterdayDateString();
          let newStreak = 1;
          if (userProfile.last_study_date === yesterday) newStreak = userProfile.current_streak + 1;
          const newLongest = Math.max(userProfile.longest_streak, newStreak);
          newProfile = { last_study_date: today, current_streak: newStreak, longest_streak: newLongest };
        }

        // Local Optimistic Update
        setUserProgress(newProgressMap);
        setUserProfile(newProfile);
        localStorage.setItem('wordMasterProgress', JSON.stringify(newProgressMap));
        localStorage.setItem('wordMonsterProfile', JSON.stringify(newProfile));

        // Save to Firestore (Compat API)
        if (user && db) {
          const docRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/main`);
          docRef.set({ progress: newProgressMap, profile: newProfile }, { merge: true }).catch(console.error);
        }
        // ------------------------------------------------

        setCurrentIndex(prev => prev + 1);
        setPosition({ x: 0, y: 0 });
        setShowMeaning(false);
        setIsDragging(false); 
        setIsTimeoutPenalty(false); 
        setIsTimerRunning(false); 

        if (direction === 'right') setKnownCount(c => c + 1);
        else setUnknownCount(c => c + 1);

        setTimeout(() => {
          setExitingCard(null);
        }, 450);
      };

      const triggerExitRef = useRef(triggerExit);
      useEffect(() => {
        triggerExitRef.current = triggerExit;
      }, [triggerExit]);

      // タイムバーのアニメーション管理
      useEffect(() => {
        if (currentScreen !== 'learning' || settingTimeLimit === 0 || currentIndex >= words.length || isTimeoutPenalty || exitingCard) {
          setIsTimerRunning(false);
          return;
        }

        let rafId2;
        const rafId1 = requestAnimationFrame(() => {
          rafId2 = requestAnimationFrame(() => {
            setIsTimerRunning(true);
          });
        });

        const timer = setTimeout(() => {
          playSound('timeout');
          setIsTimeoutPenalty(true);
          setIsTimerRunning(false);
        }, settingTimeLimit * 1000);

        return () => {
          cancelAnimationFrame(rafId1);
          if (rafId2) cancelAnimationFrame(rafId2);
          clearTimeout(timer);
        };
      }, [currentIndex, currentScreen, settingTimeLimit, words.length, isTimeoutPenalty, exitingCard]);

      useEffect(() => {
        if (isTimeoutPenalty) {
          const timer = setTimeout(() => {
            triggerExitRef.current('left', true);
          }, 1500);
          return () => clearTimeout(timer);
        }
      }, [isTimeoutPenalty]);

      // --- Reset Progress ---
      const handleResetProgress = async () => {
        playSound('click');
        const emptyProgress = {};
        const emptyProfile = { last_study_date: null, current_streak: 0, longest_streak: 0 };
        
        // Local Update
        setUserProgress(emptyProgress);
        setUserProfile(emptyProfile);
        localStorage.removeItem('wordMasterProgress');
        localStorage.removeItem('wordMonsterProfile');
        
        // Cloud Update (Compat API)
        if (user && db) {
          try {
            const docRef = db.doc(`artifacts/${appId}/users/${user.uid}/appData/main`);
            await docRef.set({ progress: emptyProgress, profile: emptyProfile }, { merge: true });
          } catch (err) {
            console.error("Reset save error", err);
          }
        }
        
        setShowResetModal(false);
      };

      const goHome = () => {
        playSound('click');
        setIsStatsFlipped(false); 
        setCurrentScreen('home');
      };

      const goToPartSelection = () => {
        playSound('click');
        setCurrentScreen('selectPart');
      };
      
      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      const startLearning = (partId) => {
        playSound('start');
        setSelectedPart(partId);
        if (partId === 'test') {
          const sId = Number(settingStartId) || 1;
          const eId = Number(settingEndId) || 50;
          const list = allWordsList.filter(w => w.id >= sId && w.id <= eId);
          setShuffledWords(shuffleArray(list));
        } else {
          setShuffledWords(shuffleArray(wordData[partId] || []));
        }
        setCurrentIndex(0);
        setKnownCount(0);
        setUnknownCount(0);
        setExitingCard(null);
        setShowMeaning(false);
        setPosition({ x: 0, y: 0 });
        setIsTimeoutPenalty(false);
        setIsTimerRunning(false);
        setCurrentScreen('learning');
      };

      const openSettings = (partId) => {
        playSound('click');
        setSelectedPart(partId);
        setSettingHideMastered(false);
        
        if (partId === 'test') {
          setSettingStartId(1);
          setSettingEndId(50);
        }
        setSettingWordCount(1);
        setCurrentScreen('partSettings');
      };

      const startLearningWithSettings = () => {
        playSound('start');
        let list = [];
        if (selectedPart === 'test') {
          const sId = Number(settingStartId) || 1;
          const eId = Number(settingEndId) || 50;
          list = allWordsList.filter(w => w.id >= sId && w.id <= eId);
        } else {
          list = [...(wordData[selectedPart] || [])];
        }
        
        if (settingHideMastered) {
          list = list.filter(w => !userProgress[w.id] || userProgress[w.id].status !== 2);
        }
        
        list = shuffleArray(list);
        list = list.slice(0, settingWordCount);
        
        setShuffledWords(list);
        setCurrentIndex(0);
        setKnownCount(0);
        setUnknownCount(0);
        setExitingCard(null);
        setShowMeaning(false);
        setPosition({ x: 0, y: 0 });
        setIsTimeoutPenalty(false);
        setIsTimerRunning(false);
        setCurrentScreen('learning');
      };

      const restartCurrentSession = () => {
        playSound('start');
        // 直前の単語リストをそのままシャッフルして再開
        setShuffledWords(shuffleArray([...shuffledWords]));
        setCurrentIndex(0);
        setKnownCount(0);
        setUnknownCount(0);
        setExitingCard(null);
        setShowMeaning(false);
        setPosition({ x: 0, y: 0 });
        setIsTimeoutPenalty(false);
        setIsTimerRunning(false);
      };

      // --- ローディング画面 ---
      if (isLoading) {
        return (
          <div className="fixed inset-0 bg-slate-950 flex items-center justify-center font-sans">
            <div className="flex flex-col items-center gap-4">
              <Icon name="RotateCcw" className="text-sky-500 animate-spin" size={32} />
              <div className="text-sky-500 font-black tracking-[0.2em] text-xs">SYNCING DATA...</div>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 bg-slate-950 text-slate-100 font-sans flex flex-col overflow-hidden touch-none select-none">
          
          {/* --- Reset Confirmation Modal --- */}
          {showResetModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-[2rem] p-6 md:p-8 max-w-xs w-full shadow-2xl flex flex-col items-center text-center animate-[zoomIn_0.2s_ease-out]">
                <div className="w-16 h-16 bg-rose-500/10 rounded-full flex items-center justify-center mb-4 border border-rose-500/20">
                  <Icon name="RotateCcw" size={28} className="text-rose-500" />
                </div>

                    <div>
                      <h2 className="text-sm md:text-base font-black text-white mb-1">習得済を非表示</h2>
                      <p className="text-[10px] md:text-xs text-slate-500 font-medium">Masteredマークの単語を除外します</p>
                    </div>
                    <button 
                      onClick={() => { playSound('toggle'); setSettingHideMastered(!settingHideMastered); }}
                      className={`w-12 h-6 rounded-full relative transition-colors duration-300 shrink-0 ${settingHideMastered ? (selectedPart === 'test' ? 'bg-indigo-500' : 'bg-sky-500') : 'bg-slate-700'}`}
                    >
                      <div 
                        className={`w-5 h-5 bg-white rounded-full absolute top-0.5 transition-transform duration-300`} 
                        style={{ left: '0', transform: settingHideMastered ? 'translateX(26px)' : 'translateX(2px)' }} 
                      />
                    </button>
                  </div>

                </div>

                <div className="flex-none pb-4 md:pb-6 max-w-sm mx-auto w-full shrink-0">
                  <button 
                    onClick={startLearningWithSettings}
                    disabled={availableWordsCount === 0}
                    className={`w-full py-4 md:py-5 text-white font-black rounded-2xl active:scale-95 transition-all text-base md:text-lg tracking-wider flex justify-center items-center gap-2 disabled:opacity-50 disabled:active:scale-100 disabled:shadow-none ${selectedPart === 'test' ? 'bg-indigo-600 shadow-[0_10px_30px_rgba(79,70,229,0.3)]' : 'bg-sky-500 shadow-[0_10px_30px_rgba(14,165,233,0.3)]'}`}
                  >
                    {availableWordsCount === 0 ? '対象の単語がありません' : 'START LEARNING'}
                  </button>
                </div>
              </div>
            );
          })()}

          {/* --- RENDER: LEARNING SCREEN --- */}
          {currentScreen === 'learning' && (
            <div className="flex-1 flex flex-col overflow-hidden">
              <header className="flex-none pt-4 pb-2 px-6 flex justify-between items-center h-16 border-b border-white/5 bg-slate-950/80 backdrop-blur-md z-10">
                <div className="flex items-center gap-3 cursor-pointer active:opacity-70 transition-opacity" onClick={goToPartSelection}>
                  <div className={`p-1.5 rounded-lg flex items-center justify-center ${selectedPart === 'test' ? 'bg-indigo-500' : 'bg-sky-500'}`}>
                    <Icon name="ChevronLeft" size={18} className="text-white" />
                  </div>
                  <div>
                    <h1 className="text-sm font-black tracking-tighter leading-none">WORD MASTER</h1>
                    <p className={`text-[10px] font-bold uppercase tracking-widest ${selectedPart === 'test' ? 'text-indigo-400' : 'text-sky-500'}`}>
                      {selectedPart === 'test' ? 'TEST MODE' : (partsInfo.find(p => p.id === selectedPart) || {}).title}
                    </p>
                  </div>
                </div>
                <div className="text-[11px] font-mono text-slate-400 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                  {Math.min(currentIndex + 1, words.length)} / {words.length}
                </div>
              </header>

              <div className="flex-none w-full bg-slate-900/30">
                <div 
                  className={`h-1 transition-all duration-300 ${selectedPart === 'test' ? 'bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.5)]' : 'bg-sky-500 shadow-[0_0_10px_rgba(14,165,233,0.5)]'}`} 
                  style={{ width: `${words.length > 0 ? (currentIndex / words.length) * 100 : 0}%` }}
                />
              </div>

              {settingTimeLimit > 0 && currentIndex < words.length && !exitingCard && (
                <div className="flex-none w-full h-1 bg-slate-900 overflow-hidden border-b border-slate-800/50">
                  <div 
                    className="h-full bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.8)]" 
                    style={{ 
                      width: isTimerRunning && !isTimeoutPenalty ? '0%' : '100%', 
                      transition: isTimerRunning && !isTimeoutPenalty ? `width ${settingTimeLimit}s linear` : 'none' 
                    }}
                  />
                </div>
              )}

              <main className="flex-1 relative flex items-center justify-center p-4 md:p-8 min-h-0 overflow-hidden">
                <div 
                  className="relative w-full flex justify-center items-center"
                  style={
                    currentIndex >= words.length && !exitingCard
                      ? { maxWidth: '500px', width: '100%' } // 完了画面時は中身に合わせて縦幅を拡張
                      : { aspectRatio: '3 / 2', maxHeight: '60vh', maxWidth: '500px' } // 学習中は固定比率
                  }
                >
                  {currentIndex >= words.length && !exitingCard ? (
                    <div className="w-full bg-slate-900 rounded-[2rem] md:rounded-[3rem] flex flex-col items-center justify-center p-6 md:p-8 text-center border border-white/5 animate-[zoomIn_0.5s_ease-out] shadow-2xl z-0">
                      <h2 className="flex items-center justify-center gap-2 text-xl md:text-2xl font-black text-white mb-2 uppercase">
                        <Icon name="CheckCircle" size={28} className="text-emerald-500" />
                        {selectedPart === 'test' ? 'TEST MODE' : (partsInfo.find(p => p.id === selectedPart) || {}).title} DONE!
                      </h2>
                      <p className="text-slate-500 text-xs md:text-sm mb-6">進捗はダッシュボードに保存されました。</p>
                      <div className="flex flex-col gap-2.5 w-full">
                        <button 
                          onClick={startLearningWithSettings}
                          className={`w-full py-3.5 text-white text-sm font-black rounded-full shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 ${selectedPart === 'test' ? 'bg-indigo-600 shadow-indigo-500/30' : 'bg-sky-500 shadow-sky-500/30'}`}
                        >
                          <Icon name="ChevronLeft" size={18} className="rotate-180" /> 次へ進む
                        </button>
                        <button 
                          onClick={restartCurrentSession}
                          className="w-full py-3.5 bg-[#12B981] text-white text-sm font-black rounded-full shadow-lg shadow-[#12B981]/30 active:scale-95 transition-all flex items-center justify-center gap-2"
                        >
                          <Icon name="RotateCcw" size={18} /> 全て復習する
                        </button>
                        <button 
                          onClick={() => openSettings(selectedPart)}
                          className="w-full py-3.5 bg-slate-800 text-slate-300 text-sm font-black rounded-full active:scale-95 transition-all flex items-center justify-center gap-2"
                        >
                          <Icon name="Settings" size={18} /> 詳細設定を変更する
                        </button>
                      </div>
                    </div>
                  ) : (
                    <React.Fragment>
                      {exitingCard && <ExitingCard key="exit-card" card={exitingCard} progress={userProgress[exitingCard.word.id]} />}

                      {words.map((word, index) => {
                        if (index < currentIndex || index > currentIndex + 1) return null;

                        const isCurrent = index === currentIndex;
                        const isNext = index === currentIndex + 1;
                        const progress = userProgress[word.id] || { status: 0, consecutive_correct: 0, required_streak: REQUIRED_STREAK };
                        const isMastered = progress && progress.status === 2;
                        const currentRequiredStreak = (progress && progress.required_streak) || REQUIRED_STREAK;

                        let cardStyle = {
                          position: 'absolute',
                          top: 0, left: 0, right: 0, bottom: 0,
                          transformOrigin: 'center center',
                          willChange: 'transform'
                        };

                        if (isCurrent) {
                          cardStyle.zIndex = 10;
                          if (isDragging) {
                            cardStyle.transition = 'none';
                            cardStyle.transform = `translate3d(${position.x}px, ${position.y}px, 0) rotate(${position.x * 0.05}deg)`;
                          } else {
                            cardStyle.transition = 'transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1)';
                            cardStyle.transform = `translate3d(0px, 0px, 0) rotate(0deg)`;
                          }
                          cardStyle.opacity = 1;
                        } else if (isNext) {
                          cardStyle.zIndex = 5;
                          cardStyle.transform = 'translate3d(0px, 0px, 0) scale(0.95)';
                          cardStyle.opacity = 0.4;
                          cardStyle.transition = 'transform 400ms cubic-bezier(0.2, 0.8, 0.2, 1)';
                          
                          if (exitingCard) {
                            cardStyle.transform = 'translate3d(0px, 0px, 0) scale(1)';
                            cardStyle.opacity = 1;
                          }
                        }

                        return (
                          <div
                            key={word.id}
                            onMouseDown={isCurrent ? handleDragStart : undefined}
                            onMouseMove={isCurrent ? handleDragMove : undefined}
                            onMouseUp={isCurrent ? handleDragEnd : undefined}
                            onMouseLeave={isCurrent ? handleDragEnd : undefined}
                            onTouchStart={isCurrent ? handleDragStart : undefined}
                            onTouchMove={isCurrent ? handleDragMove : undefined}
                            onTouchEnd={isCurrent ? handleDragEnd : undefined}
                            style={{
                              ...cardStyle,
                              cursor: isCurrent ? (isDragging ? 'grabbing' : 'grab') : 'default',
                              pointerEvents: isCurrent && !exitingCard ? 'auto' : 'none',
                            }}
                            className={`bg-slate-900 rounded-[2rem] md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-6 md:p-12 border border-white/10 overflow-hidden ${!isCurrent ? 'bg-slate-900/80' : ''}`}
                          >
                            {isCurrent && (
                              <div className="absolute top-6 left-0 w-full pointer-events-none z-20">
                                <div className={`absolute left-8 top-0 text-rose-400 font-black text-[12px] tracking-[0.2em] transition-opacity duration-200 ${position.x < -20 ? 'opacity-100' : 'opacity-0'}`}>REVIEW</div>
                                
                                <div className="flex justify-center w-full">
                                  <div className="flex gap-1 bg-slate-950/50 px-3 py-1.5 rounded-full border border-white/5 shadow-md">
                                    {isMastered ? (
                                      <span className="text-[10px] text-emerald-400 font-bold flex items-center gap-1"><Icon name="CheckCircle" size={12}/> MASTERED</span>
                                    ) : (
                                      [...Array(currentRequiredStreak)].map((_, i) => (
                                        <div key={i} className={`w-2 h-2 rounded-full transition-colors duration-300 ${i < (progress && progress.consecutive_correct) ? 'bg-sky-400' : 'bg-slate-700'}`} />
                                      ))
                                    )}
                                  </div>
                                </div>

                                <div className={`absolute right-8 top-0 text-emerald-400 font-black text-[12px] tracking-[0.2em] transition-opacity duration-200 ${position.x > 20 ? 'opacity-100' : 'opacity-0'}`}>MASTERED</div>
                              </div>
                            )}

                            <div className="text-center w-full flex flex-col items-center justify-center h-full relative">
                              <h2 className={`text-5xl md:text-7xl font-black text-white tracking-tighter transition-all duration-300 ${isCurrent && (showMeaning || isTimeoutPenalty) ? 'opacity-10 blur-md scale-90' : 'opacity-100'}`}>
                                {word.en}
                              </h2>
                              
                              {isCurrent && (showMeaning || isTimeoutPenalty) && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-6 animate-[zoomIn_0.2s_ease-out] z-10">
                                  {isTimeoutPenalty && (
                                    <div className="text-rose-500 font-black text-xl mb-4 animate-pulse tracking-widest pointer-events-none drop-shadow-md">TIME OUT</div>
                                  )}
                                  <p className={`text-xl md:text-2xl font-bold leading-relaxed p-6 md:p-10 rounded-[2rem] border backdrop-blur-md shadow-2xl ${selectedPart === 'test' ? 'text-indigo-100 bg-indigo-600/20 border-indigo-500/30' : 'text-sky-100 bg-sky-600/20 border-sky-500/30'}`}>
                                    {word.jp}
                                  </p>
                                </div>
                              )}
                            </div>

                            {isCurrent && !showMeaning && !isTimeoutPenalty && (
                              <div className="absolute bottom-6 text-[10px] font-bold tracking-[0.4em] text-slate-600 uppercase">
                                Swipe or Tap
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </React.Fragment>
                  )}
                </div>
              </main>

              <footer className="flex-none p-6 pb-10 flex items-center justify-center h-32 bg-slate-950/80 backdrop-blur-md z-10 border-t border-white/5">
                <div className="w-full max-w-[400px] flex items-center justify-between px-4">
                  
                  <div className="flex flex-col items-center gap-2">
                    <button 
                      onClick={() => triggerExit('left')}
                      disabled={!!exitingCard || currentIndex >= words.length || isTimeoutPenalty}
                      className="w-14 h-14 rounded-2xl bg-slate-900/50 flex items-center justify-center border border-rose-500/30 text-rose-500 hover:bg-rose-500/10 transition-colors disabled:opacity-50"
                    >
                      <Icon name="X" size={24} />
                    </button>
                    <span className="text-[11px] font-mono text-slate-500 font-bold tracking-widest">{unknownCount}</span>
                  </div>

                  <button 
                    onPointerDown={(e) => { e.stopPropagation(); playSound('click'); if(!exitingCard && currentIndex < words.length && !isTimeoutPenalty) setShowMeaning(!showMeaning); }}
                    disabled={currentIndex >= words.length || isTimeoutPenalty}
                    className={`w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 active:scale-90 border-[6px] ${showMeaning ? (selectedPart === 'test' ? 'bg-indigo-500 border-indigo-400/50 text-white shadow-[0_0_25px_rgba(99,102,241,0.4)]' : 'bg-sky-500 border-sky-400/50 text-white shadow-[0_0_25px_rgba(14,165,233,0.4)]') : 'bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-700'} disabled:opacity-50`}
                  >
                    <Icon name="Lightbulb" size={36} fill={showMeaning ? "currentColor" : "none"} />
                  </button>

                  <div className="flex flex-col items-center gap-2">
                    <button 
                      onClick={() => triggerExit('right')}
                      disabled={!!exitingCard || currentIndex >= words.length || isTimeoutPenalty}
                      className="w-14 h-14 rounded-2xl bg-slate-900/50 flex items-center justify-center border border-emerald-500/30 text-emerald-500 hover:bg-emerald-500/10 transition-colors disabled:opacity-50"
                    >
                      <Icon name="Heart" size={24} />
                    </button>
                    <span className="text-[11px] font-mono text-slate-500 font-bold tracking-widest">{knownCount}</span>
                  </div>

                </div>
              </footer>
            </div>
          )}
        </div>
      );
    };

    // レンダリング開始
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
